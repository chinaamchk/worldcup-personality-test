            justify-content: center;

            padding: 0;

        .lang-title {
            color: #ffffff;
            text-align: center;
            margin-bottom: 40px;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .lang-title span {
            display: block;
            font-size: 14px;
            font-weight: normal;
            margin-top: 10px;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .lang-btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 75%;
        }

            padding: 16px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            color: var(--primary-red);

        }

            width: 100%;
            position: relative; 
            display: none; 
            flex-direction: column;
        }
        #homePage img.bg-img {
            width: 100%;
            height: auto;
            display: block; 
        }

        /* 隐形热区按钮 */
        .start-hotspot {

            bottom: 16%; 
            left: 50%;
            transform: translateX(-50%); 
            width: 60%; 
            height: 10%;
            background-color: transparent; 
            cursor: pointer;
            z-index: 10;
        }

            display: none; 
            flex-direction: column;
            align-items: center;

            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            z-index: 5;
        }

            height: 100%;
            width: auto; 
            object-fit: contain;
        }

            width: 100%;
            background: var(--bg-cream);
            border-radius: 24px; 
            padding: 35px 25px 25px; 
            box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            color: var(--text-dark);

            z-index: 2;

        .q-progress { font-size: 15px; color: var(--text-dark); font-weight: 600; }
        .progress-track { width: 100%; height: 8px; background-color: #e5dfd5; border-radius: 5px; margin-bottom: 30px; overflow: hidden; display: flex; }
        .progress-fill { height: 100%; background-color: var(--dark-red); border-radius: 5px; transition: width 0.3s ease; width: 0%; }
        
        .question-box h2 { font-size: 20px; font-weight: 800; color: var(--text-dark); margin-bottom: 30px; line-height: 1.5; letter-spacing: 0.5px; }

        .option-btn { display: flex; align-items: center; width: 100%; background: #ffffff; border: 1px solid var(--border-light); border-radius: 12px; padding: 16px 15px; margin-bottom: 15px; cursor: pointer; transition: all 0.2s; text-align: left; box-sizing: border-box; }
        .option-letter { width: 28px; height: 28px; background-color: var(--option-gray); color: #888888; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 14px; margin-right: 15px; flex-shrink: 0; transition: all 0.2s; }
        .option-text { font-size: 15px; color: var(--text-dark); line-height: 1.5; font-weight: 500; }
        
        .option-btn.selected { border-color: var(--primary-red); background-color: #fdf5f5; }
        .option-btn.selected .option-letter { background-color: var(--primary-red); color: #ffffff; }

        .nav-buttons { display: flex; justify-content: space-between; margin-top: 35px; gap: 15px; }
        .nav-btn { flex: 1; padding: 14px 0; border-radius: 30px; font-size: 16px; font-weight: 800; cursor: pointer; text-align: center; transition: all 0.2s; border: none; }
        .nav-btn:active { transform: scale(0.98); }
        .prev-btn { background: transparent; border: 1px solid var(--primary-red); color: var(--primary-red); }
        .next-btn { background: var(--dark-red); color: #ffffff; }
        .next-btn.active { background: var(--gradient-red); box-shadow: 0 4px 15px rgba(164, 28, 36, 0.4); }
        .next-btn:disabled { background: #d6d1c4; cursor: not-allowed; color: #ffffff; box-shadow: none; }

        /* ----- 底部吉祥物区 ----- */
        .mascot-container { 
            width: 100%; 
            text-align: center; 
            margin-top: 35px; 
        }
        .mascot-container img { 
            width: 130px; 
            height: auto; 
            object-fit: contain; 
            display: inline-block;
        }

        /* ----- 结果页专属样式 ----- */

        .result-sub-title { color: var(--primary-red); font-size: 18px; font-weight: bold; margin-bottom: 12px; }
        
        .quote { 
            font-style: italic; 
            color: var(--text-gray); 
            margin-bottom: 20px; 
            font-size: 20px; 
            font-weight: bold;
            line-height: 1.4;
        }
        
        .player-img-container { 
            width: 100%; 
            margin: 15px 0 25px; 
            border-radius: 16px; 
            overflow: hidden; 
            background: transparent; 
            box-shadow: none; 
        }
        #resImg { 
            width: 100%; 
            display: block; 
            object-fit: contain; 
        }
        
        .labels-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; }
        .label-tag { background: #fdf5f5; border: 1px solid var(--primary-red); color: var(--primary-red); padding: 5px 16px; font-size: 13px; border-radius: 20px; font-weight: bold;}
        
        .description { line-height: 1.8; font-size: 14px; color: var(--text-dark); text-align: left; margin-bottom: 25px; font-weight: 500;}
        
        /* 二维码 1上3下 布局 */
        .qr-section { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 25px 0; 
            padding: 20px 0; 
            border-top: 1px dashed var(--border-light); 
            gap: 20px; 
        }
        .qr-top-row {
            display: flex;
            justify-content: center;
            width: 100%;
        }
        .qr-bottom-row {
            display: flex;
            justify-content: space-between; 
            width: 100%;
        }
        .qr-box { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 8px; 
        }
        .qr-top-row .qr-box img {
            width: 85px; 
            height: 85px;
            object-fit: cover; 
            border: 1px solid var(--border-light); 
            border-radius: 6px; 
            padding: 3px; 
            background: #ffffff; 
        }
        .qr-bottom-row .qr-box {
            width: 32%; 
        }
        .qr-bottom-row .qr-box img { 
            width: 65px; 
            height: 65px; 
            object-fit: cover; 
            border: 1px solid var(--border-light); 
            border-radius: 6px; 
            padding: 3px; 
            background: #ffffff; 
        }
        .qr-text { 
            font-size: 11px; 
            color: var(--text-dark); 
            font-weight: 800; 
            text-align: center;
        }
        
        .disclaimer { font-size: 10px; color: #999; text-align: justify; line-height: 1.6; border-top: 1px solid var(--border-light); padding-top: 15px; margin-top: 20px; }

        /* 结果页操作按钮组 */
        .action-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; width: 100%; }
        .share-btn { width: 100%; background: var(--gradient-red); border: none; padding: 16px; font-size: 18px; font-weight: 800; cursor: pointer; color: #fff; border-radius: 30px; box-shadow: 0 4px 15px rgba(164, 28, 36, 0.4); }
        .restart-btn { width: 100%; background: transparent; border: 1px solid var(--primary-red); padding: 14px; font-size: 16px; font-weight: 800; cursor: pointer; color: var(--primary-red); border-radius: 30px; }
        .hidden { display: none !important; }

        /* 海报预览弹窗 */
        .poster-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(5px); }

        .poster-tip { color: #ffffff; font-size: 15px; font-weight: bold; margin-bottom: 15px; background: rgba(211, 45, 53, 0.9); padding: 8px 24px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);}

        .close-modal-btn { margin-top: 25px; width: 44px; height: 44px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; color: #fff; font-size: 28px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>

    let currentStep = 0;

    function selectLanguage(langCode) {
        currentLanguage = langCode;
        
        document.getElementById('pageTitle').innerText = uiText[currentLanguage].title;

        document.getElementById('restartBtn').innerText = uiText[currentLanguage].restartBtn;
        document.getElementById('qrTestText').innerText = uiText[currentLanguage].qrTest;
        document.getElementById('qrSocial1Text').innerText = uiText[currentLanguage].qrSocial1;
        document.getElementById('qrSocial2Text').innerText = uiText[currentLanguage].qrSocial2;
        document.getElementById('qrSocial3Text').innerText = uiText[currentLanguage].qrSocial3;
        document.getElementById('disclaimerText').innerText = uiText[currentLanguage].disclaimer;
        document.getElementById('posterTipText').innerText = uiText[currentLanguage].posterTip;

        const homeBg = document.getElementById('homeBgImg');
        const mainLogo = document.getElementById('mainLogo');
        if (langCode === 'tc') {
            homeBg.src = 'home-bg-tc.png';
            mainLogo.src = 'logo-tc.png';
        } else {
            homeBg.src = 'home-bg-sc.png';
            mainLogo.src = 'logo-sc.png';
        }

        const appContainer = document.getElementById('captureTarget');
        appContainer.style.backgroundImage = 'none';
        appContainer.style.backgroundColor = '#901217';

        document.getElementById('langPage').style.display = 'none';
        document.getElementById('homePage').style.display = 'flex';
        window.scrollTo({top: 0, behavior: 'smooth'}); 
    }

    function startQuiz() {
        const appContainer = document.getElementById('captureTarget');
        appContainer.style.backgroundImage = "url('mobile BG.png')";
        appContainer.style.backgroundColor = 'transparent';

        document.getElementById('homePage').style.display = 'none';
        document.getElementById('mainContent').style.display = 'flex'; 
        window.scrollTo({top: 0, behavior: 'smooth'}); 
    }

    function renderQuestion() {
        const q = quizData[currentStep];
        
        document.getElementById('qNumberDisplay').innerText = `Q${currentStep + 1}`;
        document.getElementById('progressText').innerText = `${currentStep + 1}/${quizData.length}`;
        const progressPercentage = ((currentStep + 1) / quizData.length) * 100;
        document.getElementById('progressBar').style.width = `${progressPercentage}%`;
        
        document.getElementById('questionTitle').innerText = q.title[currentLanguage];
        
        const optionsDiv = document.getElementById('optionsGroup');
        optionsDiv.innerHTML = '';
        
        q.options.forEach((opt, index) => {
            const currentOptText = opt.text[currentLanguage];
            const match = currentOptText.match(/^([A-Ea-e])\.\s*(.+)$/);
            const letter = match ? match[1] : String.fromCharCode(65 + index);
            const textContent = match ? match[2] : currentOptText;

            const btn = document.createElement('div');
            btn.className = 'option-btn';
            if (userSelections[currentStep] === index) btn.classList.add('selected');
            
            btn.innerHTML = `<div class="option-letter">${letter}</div><div class="option-text">${textContent}</div>`;
            btn.onclick = () => { userSelections[currentStep] = index; renderQuestion(); };
            optionsDiv.appendChild(btn);
        });

        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        
        prevBtn.style.visibility = currentStep === 0 ? 'hidden' : 'visible';
        
        nextBtn.innerText = currentStep === quizData.length - 1 ? uiText[currentLanguage].resultBtn : uiText[currentLanguage].nextBtn;

        if (userSelections[currentStep] === null) {
            nextBtn.disabled = true; nextBtn.classList.remove('active');
        } else {
            nextBtn.disabled = false; nextBtn.classList.add('active');
        }
    }

    function prevQuestion() { if (currentStep > 0) { currentStep--; renderQuestion(); } }
    
    function nextQuestion() {
        if (userSelections[currentStep] === null) return;
        if (currentStep < quizData.length - 1) { currentStep++; renderQuestion(); } 
        else { calculateAndShowResult(); }
    }

    function calculateAndShowResult() {
        let scores = {}; 
        Object.keys(resultDataConfig).forEach(name => scores[name] = 0);

        userSelections.forEach((selectedIndex, step) => {
            if (selectedIndex !== null) {
                const q = quizData[step];
                const selectedScores = q.options[selectedIndex].score;
                selectedScores.forEach(name => { 
                    if(scores.hasOwnProperty(name)) scores[name]++; 
                });
            }
        });

        let maxScore = Math.max(...Object.values(scores));
        let tiedPlayers = Object.keys(scores).filter(p => scores[p] === maxScore);
        let winner = tiedPlayers[0];
        
        if (tiedPlayers.length > 1) {
            const q5Selection = userSelections[4];
            if (q5Selection !== null) {
                const q5ScoreList = quizData[4].options[q5Selection].score;
                const q5Winners = tiedPlayers.filter(p => q5ScoreList.includes(p));
                if (q5Winners.length > 0) tiedPlayers = q5Winners;
            }

            if (tiedPlayers.length > 1) {
                const q6Selection = userSelections[5];
                if (q6Selection !== null) {
                    const q6ScoreList = quizData[5].options[q6Selection].score;
                    const q6Winners = tiedPlayers.filter(p => q6ScoreList.includes(p));
                    if (q6Winners.length > 0) tiedPlayers = q6Winners;
                }
            }

            if (tiedPlayers.length > 1) {
                const q3Selection = userSelections[2];
                if (q3Selection !== null) {
                    const q3ScoreList = quizData[2].options[q3Selection].score;
                    const q3Winners = tiedPlayers.filter(p => q3ScoreList.includes(p));
                    if (q3Winners.length > 0) tiedPlayers = q3Winners;
                }
            }

            if (tiedPlayers.length > 1) {
                const randomIndex = Math.floor(Math.random() * tiedPlayers.length);
                winner = tiedPlayers[randomIndex];
            } else {
                winner = tiedPlayers[0];
            }
        }

        document.getElementById('quizPage').classList.add('hidden');
        document.getElementById('resultPage').style.display = 'block';

        const resObj = resultDataConfig[winner];
        const localizedRes = resObj[currentLanguage];

        document.getElementById('resMainTitle').innerText = localizedRes.title;
        document.getElementById('resSubTitle').innerText = localizedRes.subtitle;
        document.getElementById('resQuote').innerText = localizedRes.quote;
        document.getElementById('resDesc').innerText = localizedRes.desc;
        document.getElementById('resImg').src = "images/" + resObj.img + ".png";

        const labelDiv = document.getElementById('resLabels');
        labelDiv.innerHTML = '';
        localizedRes.labels.forEach(l => {
            const span = document.createElement('span'); 
            span.className = 'label-tag'; 
            span.innerText = l;
            labelDiv.appendChild(span);
        });
        
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function generateSharePoster() {
        const shareBtn = document.getElementById('shareBtn');
        const originalText = shareBtn.innerText;
        shareBtn.innerText = uiText[currentLanguage].generating;
        shareBtn.disabled = true;

        const actionBtns = document.getElementById('actionButtonsGroup');
        actionBtns.classList.add('hidden');

        setTimeout(() => {
            const captureTarget = document.getElementById('captureTarget');
            window.scrollTo(0, 0);

            html2canvas(captureTarget, {
                scale: 2, 
                useCORS: true, 
                backgroundColor: "#7b1216" 
            }).then(canvas => {
                actionBtns.classList.remove('hidden');
                shareBtn.innerText = originalText;
                shareBtn.disabled = false;

                const imgData = canvas.toDataURL('image/jpeg', 0.9);
                document.getElementById('generatedPosterImg').src = imgData;
                document.getElementById('posterModal').classList.remove('hidden');

            }).catch(err => {
                console.error("生成海报失败:", err);
                alert(uiText[currentLanguage].generateFail);
                actionBtns.classList.remove('hidden');
                shareBtn.innerText = originalText;
                shareBtn.disabled = false;
            });
        }, 100);
    }

    function closePosterModal() {
        document.getElementById('posterModal').classList.add('hidden');
    }

    // --- 专属后门：客户预览直达通道 ---

        const urlParams = new URLSearchParams(window.location.search);

                const span = document.createElement('span'); 
                span.className = 'label-tag'; 
                span.innerText = l;
                labelDiv.appendChild(span);
            });
            
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    });

renderQuestion();

        const originalCalculate = calculateAndShowResult;
        if (typeof originalCalculate === 'function') {

                // 1. 先安全执行你原本微调过的所有计分和页面渲染逻辑
                originalCalculate.apply(this, arguments);
                
                // 2. 原逻辑顺利跑完后，在后台静默发起上报
                try {
                    const formURL = 'https://docs.google.com/forms/d/e/1FAIpQLSccV_FP9bBLiOEc1JC3tjQSC4JurrB4mVPU4cSlg19JUaVFHQ/formResponse';
                    const formData = new URLSearchParams();
                    
                    // 动态抓取当前运算出来的优胜球星 (winner)
                    formData.append('entry.669660879', document.getElementById('resSubTitle').innerText.replace('型', '')); 
                    formData.append('entry.152680789', currentLanguage); 

                    fetch(formURL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formData.toString()
                    }).then(() => console.log('数据已隐形发送给后台'));
                } catch (e) {
                    console.log('上报异常拦截，不卡顿页面', e);
                }
            };
        }
    })();
