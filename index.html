<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>排兵布陣 群星亮相 - 測測你的投資人格（只供娛樂使用）</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* 全局变量与色彩规范 */
        :root {
            --primary-red: #d32d35; 
            --dark-red: #7b1216; 
            --gradient-red: linear-gradient(90deg, #d32d35, #7b1216); 
            --bg-cream: #f8f6f0; 
            --text-dark: #2c2c2c;
            --text-gray: #666666;
            --border-light: #e0dcd2; 
            --option-gray: #e5dfd5; 
        }

        /* 基础重置 */
        body {
            background-color: #333333; 
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            min-height: 100vh;
            padding: 0; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* 核心 H5 容器：锁死最大宽度 */
        .app-container {
            width: 100%;
            max-width: 480px; 
            min-height: 100vh; 
            background-image: url('mobile BG.png'); 
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            box-shadow: 0 0 30px rgba(0,0,0,0.5); 
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            position: relative;
            overflow-x: hidden;
        }

        /* ----- 语言选择页样式 (第0层) ----- */
        #langPage {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 15vh;
            box-sizing: border-box;
            z-index: 20;
        }
        
        .lang-title {
            color: #ffffff;
            text-align: center;
            margin-bottom: 40px;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .lang-title span {
            display: block;
            font-size: 14px;
            font-weight: normal;
            margin-top: 10px;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .lang-btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 75%;
        }

        .lang-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid transparent;
            padding: 16px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            color: var(--primary-red);
            border-radius: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            transition: all 0.2s;
            text-align: center;
        }
        .lang-btn:active {
            transform: scale(0.96);
            background: #ffffff;
        }

        /* ----- 首页视图样式 (第一层) ----- */
        #homePage {
            width: 100%;
            position: relative; 
            display: none; 
            flex-direction: column;
        }
        #homePage img.bg-img {
            width: 100%;
            height: auto;
            display: block; 
        }

        /* 隐形热区按钮 */
        .start-hotspot {
            position: absolute;
            bottom: 7%; 
            left: 50%;
            transform: translateX(-50%); 
            width: 55%;
            height: 9%;
            background-color: transparent; 
            cursor: pointer;
            z-index: 10;
        }

        /* 默认隐藏的主内容区（含答题和结果） */
        #mainContent {
            width: 100%;
            display: none; 
            flex-direction: column;
            align-items: center;
            padding: 20px 20px 40px; 
            box-sizing: border-box;
        }

        /* ----- 顶部 Logo 区 ----- */
        .header-logo-container {
            width: 100%;
            height: 38px; 
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            z-index: 5;
        }
        .header-logo-container img {
            height: 100%;
            width: auto; 
            object-fit: contain;
        }

        /* 核心卡片容器：米白色圆角背景 */
        .card-container {
            width: 100%;
            background: var(--bg-cream);
            border-radius: 24px; 
            padding: 35px 25px 25px; 
            box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            color: var(--text-dark);
            position: relative;
            z-index: 2; 
        }

        /* ----- 答题页专属样式 ----- */
        .progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
        .q-number { font-size: 32px; font-weight: 800; color: var(--text-dark); letter-spacing: -1px; }
        .q-progress { font-size: 15px; color: var(--text-dark); font-weight: 600; }
        .progress-track { width: 100%; height: 8px; background-color: #e5dfd5; border-radius: 5px; margin-bottom: 30px; overflow: hidden; display: flex; }
        .progress-fill { height: 100%; background-color: var(--dark-red); border-radius: 5px; transition: width 0.3s ease; width: 0%; }
        
        .question-box h2 { font-size: 20px; font-weight: 800; color: var(--text-dark); margin-bottom: 30px; line-height: 1.5; letter-spacing: 0.5px; }

        .option-btn { display: flex; align-items: center; width: 100%; background: #ffffff; border: 1px solid var(--border-light); border-radius: 12px; padding: 16px 15px; margin-bottom: 15px; cursor: pointer; transition: all 0.2s; text-align: left; box-sizing: border-box; }
        .option-letter { width: 28px; height: 28px; background-color: var(--option-gray); color: #888888; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 14px; margin-right: 15px; flex-shrink: 0; transition: all 0.2s; }
        .option-text { font-size: 15px; color: var(--text-dark); line-height: 1.5; font-weight: 500; }
        
        .option-btn.selected { border-color: var(--primary-red); background-color: #fdf5f5; }
        .option-btn.selected .option-letter { background-color: var(--primary-red); color: #ffffff; }

        .nav-buttons { display: flex; justify-content: space-between; margin-top: 35px; gap: 15px; }
        .nav-btn { flex: 1; padding: 14px 0; border-radius: 30px; font-size: 16px; font-weight: 800; cursor: pointer; text-align: center; transition: all 0.2s; border: none; }
        .nav-btn:active { transform: scale(0.98); }
        .prev-btn { background: transparent; border: 1px solid var(--primary-red); color: var(--primary-red); }
        .next-btn { background: var(--dark-red); color: #ffffff; }
        .next-btn.active { background: var(--gradient-red); box-shadow: 0 4px 15px rgba(164, 28, 36, 0.4); }
        .next-btn:disabled { background: #d6d1c4; cursor: not-allowed; color: #ffffff; box-shadow: none; }

        /* ----- 底部吉祥物区 ----- */
        .mascot-container { 
            width: 100%; 
            text-align: center; 
            margin-top: 35px; 
        }
        .mascot-container img { 
            width: 130px; 
            height: auto; 
            object-fit: contain; 
            display: inline-block;
        }

        /* ----- 结果页专属样式 ----- */
        #resultPage { display: none; text-align: center; }
        
        .result-main-title { color: var(--text-dark); font-size: 34px; font-weight: 900; margin-bottom: 6px; letter-spacing: 2px;}
        .result-sub-title { color: var(--primary-red); font-size: 18px; font-weight: bold; margin-bottom: 12px; }
        
        .quote { 
            font-style: italic; 
            color: var(--text-gray); 
            margin-bottom: 20px; 
            font-size: 20px; 
            font-weight: bold;
            line-height: 1.4;
        }
        
        /* 核心修复：背景透明化以适应透明的 PNG 图片 */
        .player-img-container { 
            width: 100%; 
            margin: 15px 0 25px; 
            border-radius: 16px; 
            overflow: hidden; 
            background: transparent; /* 去除原本的白色背景 */
            box-shadow: none; /* 去除卡片阴影，让悬浮更自然 */
        }
        #resImg { 
            width: 100%; 
            display: block; 
            object-fit: contain; /* 改为 contain 防止变形 */
        }
        
        .labels-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; }
        .label-tag { background: #fdf5f5; border: 1px solid var(--primary-red); color: var(--primary-red); padding: 5px 16px; font-size: 13px; border-radius: 20px; font-weight: bold;}
        
        .description { line-height: 1.8; font-size: 14px; color: var(--text-dark); text-align: justify; margin-bottom: 25px; font-weight: 500;}
        
        /* 四个二维码 2x2 布局 */
        .qr-section { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: space-evenly; 
            align-items: flex-start; 
            margin: 25px 0; 
            padding: 20px 0; 
            border-top: 1px dashed var(--border-light); 
            gap: 20px 0; 
        }
        .qr-box { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 8px; 
            width: 45%; 
        }
        .qr-box img { 
            width: 75px; 
            height: 75px; 
            object-fit: cover; 
            border: 1px solid var(--border-light); 
            border-radius: 6px; 
            padding: 3px; 
            background: #ffffff; 
        }
        .qr-text { 
            font-size: 12px; 
            color: var(--text-dark); 
            font-weight: 800; 
            text-align: center;
        }
        
        .disclaimer { font-size: 10px; color: #999; text-align: justify; line-height: 1.6; border-top: 1px solid var(--border-light); padding-top: 15px; margin-top: 20px; }

        /* 结果页操作按钮组 */
        .action-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; width: 100%; }
        .share-btn { width: 100%; background: var(--gradient-red); border: none; padding: 16px; font-size: 18px; font-weight: 800; cursor: pointer; color: #fff; border-radius: 30px; box-shadow: 0 4px 15px rgba(164, 28, 36, 0.4); }
        .restart-btn { width: 100%; background: transparent; border: 1px solid var(--primary-red); padding: 14px; font-size: 16px; font-weight: 800; cursor: pointer; color: var(--primary-red); border-radius: 30px; }
        .hidden { display: none !important; }

        /* 海报预览弹窗 */
        .poster-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(5px); }
        .poster-content { position: relative; width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; animation: popUp 0.3s ease-out forwards; }
        @keyframes popUp { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .poster-tip { color: #ffffff; font-size: 15px; font-weight: bold; margin-bottom: 15px; background: rgba(211, 45, 53, 0.9); padding: 8px 24px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);}
        #generatedPosterImg { width: 100%; border-radius: 16px; object-fit: contain; max-height: 75vh; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .close-modal-btn { margin-top: 25px; width: 44px; height: 44px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; color: #fff; font-size: 28px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container" id="captureTarget">

    <div id="langPage">
        <div class="header-logo-container" style="margin-bottom: 40px;">
            <img src="logo.png" alt="华夏基金 (香港)">
        </div>
        
        <div class="lang-title">
            请选择您的语言
            <span>Please select your language</span>
        </div>

        <div class="lang-btn-group">
            <button class="lang-btn" onclick="selectLanguage('tc')">繁體中文</button>
            <button class="lang-btn" onclick="selectLanguage('sc')">简体中文</button>
        </div>
    </div>

    <div id="homePage">
        <img src="home-bg.jpg" alt="首页海报" class="bg-img">
        <div class="start-hotspot" onclick="startQuiz()"></div>
    </div>

    <div id="mainContent">
        <div class="header-logo-container">
            <img src="logo.png" alt="华夏基金 (香港)">
        </div>

        <div class="card-container">
            
            <div id="quizPage">
                <div class="progress-header">
                    <div class="q-number" id="qNumberDisplay">Q1</div>
                    <div class="q-progress" id="progressText">1/9</div>
                </div>
                <div class="progress-track">

                </div>

                <div class="question-box">
                    <h2 id="questionTitle">题目加载中...</h2>
                    <div id="optionsGroup"></div>
                </div>

                <div class="nav-buttons">
                    <button id="prevBtn" class="nav-btn prev-btn" onclick="prevQuestion()">上一题</button>
                    <button id="nextBtn" class="nav-btn next-btn" onclick="nextQuestion()">下一题</button>
                </div>

                <div class="mascot-container" id="mascotWrapper">
                    <img src="mascot.png" alt="华夏基金吉祥物">

            <div id="resultPage">
                <div class="result-main-title" id="resMainTitle"></div>
                <div class="result-sub-title" id="resSubTitle"></div>

                <div class="player-img-container">
                    <img id="resImg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+ip1sAAAAASUVORK5CYII=" alt="球星照片" style="min-height: 200px;">

                <div class="labels-container" id="resLabels"></div>

                <div class="description" id="resDesc"></div>

                <div class="qr-section">
                    <div class="qr-box">
                        <img src="qr-1.png" alt="QR">
                        <div class="qr-text">扫码参与测试</div>
                    </div>
                    <div class="qr-box">
                        <img src="qr-2.png" alt="QR">
                        <div class="qr-text">官方社交账号 1</div>
                    </div>
                    <div class="qr-box">
                        <img src="qr-3.png" alt="QR">
                        <div class="qr-text">官方社交账号 2</div>
                    </div>
                    <div class="qr-box">
                        <img src="qr-4.png" alt="QR">
                        <div class="qr-text">官方社交账号 3</div>
                    </div>
                </div>

                <div class="disclaimer">

                </div>

                <div class="action-buttons" id="actionButtonsGroup">
                    <button class="share-btn" id="shareBtn" onclick="generateSharePoster()">生成专属结果海报</button>
                    <button class="restart-btn" onclick="location.reload()">重新测试</button>
                </div>

            </div>
        </div> 
    </div>

</div>

<div id="posterModal" class="poster-modal hidden">
    <div class="poster-content">
        <div class="poster-tip">👉 长按下方图片保存至相册分享</div>
        <img id="generatedPosterImg" src="" alt="分享海报">
        <div class="close-modal-btn" onclick="closePosterModal()">×</div>
    </div>
</div>

<script>
    let currentLanguage = 'sc'; 

    function selectLanguage(langCode) {
        currentLanguage = langCode;
        document.getElementById('langPage').style.display = 'none';
        document.getElementById('homePage').style.display = 'flex';
        window.scrollTo({top: 0, behavior: 'smooth'}); 
    }

    function startQuiz() {
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('mainContent').style.display = 'flex'; 
        window.scrollTo({top: 0, behavior: 'smooth'}); 
    }

    const questions = [
        {
            id: "Q1",
            title: "假设你化身场上球员，对阵完全陌生的对手，开场你会怎么踢？",
            options: [
                { text: "A. 先观察对手战术，绝不盲目冲，摸清底细再动脚", score: ["梅西", "马丁内斯"] },
                { text: "B. 开局直接全线压上猛冲，靠气势压制对手，主打一个先发制人", score: ["姆巴佩", "C 罗"] },
                { text: "C. 不按常规出牌，靠灵光一现制造意外惊喜", score: ["亚马尔", "哈兰德"] },
                { text: "D. 牢牢锁死中场球权，稳扎稳打控节奏，绝不轻易丢球", score: ["贝林厄姆", "罗德里"] }
            ]
        },
        {
            id: "Q2",
            title: "球队比分落后 1 球，场上局势吃紧，你的第一选择是？",
            options: [
                { text: "A. 稳住阵脚，耐心等待对手露出破绽，不急于强攻", score: ["罗德里", "贝林厄姆"] },
                { text: "B. 全员火力拉满疯狂进攻，不惜代价快速扳平比分", score: ["C 罗", "哈兰德", "姆巴佩"] },
                { text: "C. 切换全新战术打法，针对性抓对方防守短板", score: ["迪亚斯", "萨利巴", "梅西", "亚马尔"] },
                { text: "D. 信任队内核心大腿，按原定战术稳步执行，不轻易乱改", score: ["马丁内斯", "范戴克"] }
            ]
        },
        {
            id: "Q3",
            title: "你最欣赏以下哪种球员？",
            options: [
                { text: "A. “控球大师”：球队的进攻发动机", score: ["贝林厄姆", "罗德里", "梅西"] },
                { text: "B. “关键先生”：读秒绝杀、一锤定音", score: ["C 罗", "姆巴佩", "贝林厄姆"] },
                { text: "C. “未来之星”：新生代超新星，天赋拉满", score: ["亚马尔", "哈兰德"] },
                { text: "D. “叹息之墙”：顶级门神 / 铁卫，零封专业户", score: ["范戴克", "迪亚斯", "萨利巴", "马丁内斯"] }
            ]
        },
        {
            id: "Q4",
            title: "你怎么看待“赢球最重要，踢得丑无所谓”这句话？",
            options: [
                { text: "A. 完全同意，赢球才是硬道理", score: ["马丁内斯", "范戴克"] },
                { text: "B. 偶尔还行", score: ["哈兰德", "迪亚斯"] },
                { text: "C. 打出让人铭记的精彩名场面最重要", score: ["贝林厄姆", "梅西"] },
                { text: "D. 完全不能接受，坚持漂亮足球", score: ["亚马尔", "姆巴佩"] }
            ]
        },
        {
            id: "Q5",
            title: "你的竞技心态属于哪一种？",
            options: [
                { text: "A. 天生大心脏，越到决赛、生死战越亢奋，大赛超常发挥", score: ["姆巴佩", "马丁内斯"] },
                { text: "B. 稳定型选手，大小比赛发挥统一，稳定靠谱", score: ["罗德里", "萨利巴", "范戴克"] },
                { text: "C. 小赛封神，大赛心态容易崩掉", score: ["亚马尔", "哈兰德"] },
                { text: "D. 状态两极分化，时而天神下凡，时而隐身", score: ["C 罗", "贝林厄姆"] }
            ]
        },
        {
            id: "Q6",
            title: "下面哪种球队战术风格，是你最偏爱？",
            options: [
                { text: "A. 防守反击闪电战，等对手失误快速得分", score: ["姆巴佩", "哈兰德"] },
                { text: "B. 极致的控球，反复传导磨灭对手的意志", score: ["梅西", "罗德里"] },
                { text: "C. 奔放的桑巴舞者，美丽足球+英雄主义，观赏性拉满", score: ["亚马尔", "贝林厄姆"] },
                { text: "D. 铁桶阵、摆大巴，主打零漏洞", score: ["范戴克", "迪亚斯", "萨利巴"] },
                { text: "E. 高位逼抢，压迫对手，机会是靠自己抢出来的", score: ["迪亚斯"] }
            ]
        },
        {
            id: "Q7",
            title: "比赛只剩最后五分钟，球队仍处于落后，你会怎么做？",
            options: [
                { text: "A. 化身队内气氛组，不停鼓励队友稳住心态，凝聚全队士气", score: ["范戴克", "迪亚斯", "马丁内斯"] },
                { text: "B. 眼里只有破门得分，不顾一切持球突破、强攻射门", score: ["C 罗", "哈兰德", "姆巴佩"] },
                { text: "C. 沉下心耐心蹲守，等待对手失误漏出破绽，一击制胜", score: ["亚马尔", "梅西"] },

    let currentStep = 0;
    let userSelections = new Array(questions.length).fill(null); 

    function renderQuestion() {
        const q = questions[currentStep];
        
        document.getElementById('qNumberDisplay').innerText = `Q${currentStep + 1}`;
        document.getElementById('progressText').innerText = `${currentStep + 1}/${questions.length}`;
        const progressPercentage = ((currentStep + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progressPercentage}%`;
        document.getElementById('questionTitle').innerText = q.title;
        
        const optionsDiv = document.getElementById('optionsGroup');
        optionsDiv.innerHTML = '';
        
        q.options.forEach((opt, index) => {
            const match = opt.text.match(/^([A-Ea-e])\.\s*(.+)$/);
            const letter = match ? match[1] : String.fromCharCode(65 + index);
            const textContent = match ? match[2] : opt.text;

            const btn = document.createElement('div');
            btn.className = 'option-btn';
            if (userSelections[currentStep] === index) btn.classList.add('selected');
            
            btn.innerHTML = `<div class="option-letter">${letter}</div><div class="option-text">${textContent}</div>`;
            btn.onclick = () => { userSelections[currentStep] = index; renderQuestion(); };
            optionsDiv.appendChild(btn);
        });

        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        
        prevBtn.style.visibility = currentStep === 0 ? 'hidden' : 'visible';
        nextBtn.innerText = currentStep === questions.length - 1 ? "查看结果" : "下一题";

        if (userSelections[currentStep] === null) {
            nextBtn.disabled = true; nextBtn.classList.remove('active');
        } else {
            nextBtn.disabled = false; nextBtn.classList.add('active');
        }
    }

    function prevQuestion() { if (currentStep > 0) { currentStep--; renderQuestion(); } }
    
    function nextQuestion() {
        if (userSelections[currentStep] === null) return;
        if (currentStep < questions.length - 1) { currentStep++; renderQuestion(); } 
        else { calculateAndShowResult(); }
    }

    function calculateAndShowResult() {
        let scores = {}; 
        Object.keys(resultData).forEach(name => scores[name] = 0);

        userSelections.forEach((selectedIndex, step) => {
            if (selectedIndex !== null) {
                const q = questions[step];
                const selectedScores = q.options[selectedIndex].score;
                selectedScores.forEach(name => { 
                    if(scores.hasOwnProperty(name)) scores[name]++; 
                });
            }
        });

        let maxScore = Math.max(...Object.values(scores));
        let tiedPlayers = Object.keys(scores).filter(p => scores[p] === maxScore);
        let winner = tiedPlayers[0];
        
        if (tiedPlayers.length > 1) {
            const q5Selection = userSelections[4];
            if (q5Selection !== null) {
                const q5ScoreList = questions[4].options[q5Selection].score;
                const q5Winners = tiedPlayers.filter(p => q5ScoreList.includes(p));
                if (q5Winners.length > 0) tiedPlayers = q5Winners;
            }

            if (tiedPlayers.length > 1) {
                const q6Selection = userSelections[5];
                if (q6Selection !== null) {
                    const q6ScoreList = questions[5].options[q6Selection].score;
                    const q6Winners = tiedPlayers.filter(p => q6ScoreList.includes(p));
                    if (q6Winners.length > 0) tiedPlayers = q6Winners;
                }
            }

            if (tiedPlayers.length > 1) {
                const q3Selection = userSelections[2];
                if (q3Selection !== null) {
                    const q3ScoreList = questions[2].options[q3Selection].score;
                    const q3Winners = tiedPlayers.filter(p => q3ScoreList.includes(p));
                    if (q3Winners.length > 0) tiedPlayers = q3Winners;
                }
            }

            if (tiedPlayers.length > 1) {
                const randomIndex = Math.floor(Math.random() * tiedPlayers.length);
                winner = tiedPlayers[randomIndex];
            } else {
                winner = tiedPlayers[0];
            }
        }

        document.getElementById('quizPage').classList.add('hidden');
        document.getElementById('resultPage').style.display = 'block';

        const res = resultData[winner];
        document.getElementById('resMainTitle').innerText = res.title;
        document.getElementById('resSubTitle').innerText = res.subtitle;
        document.getElementById('resQuote').innerText = res.quote;
        document.getElementById('resDesc').innerText = res.desc;
        
        // 核心修复：更新后缀名为 .png 匹配客户提供的图片格式
        document.getElementById('resImg').src = "images/" + res.img + ".png";

        const labelDiv = document.getElementById('resLabels');
        labelDiv.innerHTML = '';
        res.labels.forEach(l => {
            const span = document.createElement('span'); 
            span.className = 'label-tag'; 
            span.innerText = l;
            labelDiv.appendChild(span);
        });
        
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function generateSharePoster() {
        const shareBtn = document.getElementById('shareBtn');
        const originalText = shareBtn.innerText;
        shareBtn.innerText = "正在生成专属海报...";
        shareBtn.disabled = true;

        const actionBtns = document.getElementById('actionButtonsGroup');
        actionBtns.classList.add('hidden');

        setTimeout(() => {
            const captureTarget = document.getElementById('captureTarget');
            window.scrollTo(0, 0);

            html2canvas(captureTarget, {
                scale: 2, 
                useCORS: true, 
                backgroundColor: "#7b1216" 
            }).then(canvas => {
                actionBtns.classList.remove('hidden');
                shareBtn.innerText = originalText;
                shareBtn.disabled = false;

                const imgData = canvas.toDataURL('image/jpeg', 0.9);
                document.getElementById('generatedPosterImg').src = imgData;
                document.getElementById('posterModal').classList.remove('hidden');

            }).catch(err => {
                console.error("生成海报失败:", err);
                alert("抱歉，生成专属海报失败，请稍后重试。");
                actionBtns.classList.remove('hidden');
                shareBtn.innerText = originalText;
                shareBtn.disabled = false;
            });
        }, 100);
    }

    function closePosterModal() {
        document.getElementById('posterModal').classList.add('hidden');
    }

    renderQuestion();
